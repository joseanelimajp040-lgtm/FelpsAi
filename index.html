/* ═══════════════════════════════════════════════════════════════
   MÓDULO: Artifact System — Genesis AI
   Adicione este bloco como o último <script> antes de </body>
   ═══════════════════════════════════════════════════════════════ */
(function () {
  'use strict';

  /* ── Estado atual do artefato aberto ── */
  let currentArtifact = null;

  /* ─────────────────────────────────────
     1. DETECÇÃO DE BLOCOS DE CÓDIGO
     ───────────────────────────────────── */
  function detectCodeBlocks(md) {
    const regex = /```(\w*)\n?([\s\S]*?)```/g;
    const blocks = [];
    let match;
    while ((match = regex.exec(md)) !== null) {
      const lang = match[1].trim() || 'code';
      const code = match[2].trim();
      if (code.length > 0) blocks.push({ lang, code });
    }
    if (!blocks.length) return null;
    /* Extrai o texto explicativo fora dos blocos de código */
    const explanation = md.replace(/```[\s\S]*?```/g, '').trim();
    return { blocks, explanation };
  }

  /* ─────────────────────────────────────
     2. RÓTULOS LEGÍVEIS POR LINGUAGEM
     ───────────────────────────────────── */
  const LANG_LABELS = {
    html:'HTML', css:'CSS', js:'JavaScript', javascript:'JavaScript',
    ts:'TypeScript', typescript:'TypeScript', jsx:'React JSX', tsx:'React TSX',
    py:'Python', python:'Python', java:'Java', cpp:'C++', c:'C', cs:'C#',
    php:'PHP', rb:'Ruby', go:'Go', rs:'Rust', swift:'Swift', kt:'Kotlin',
    sql:'SQL', bash:'Bash', sh:'Shell', json:'JSON', xml:'XML', yaml:'YAML',
    md:'Markdown', vue:'Vue', svelte:'Svelte',
  };

  /* ─────────────────────────────────────
     3. RENDER: CARD DE ARTEFATO na gaveta
     ───────────────────────────────────── */
  function renderArtifactReply(detected, onDone) {
    const rc    = document.getElementById('rich-content');
    const rh    = document.getElementById('reply-hint');
    const dot   = document.getElementById('live-dot');
    const fstat = document.getElementById('footer-status');

    rc.innerHTML = '';
    if (rh) rh.style.display = 'none';

    /* Renderiza explicação (sem os blocos de código) */
    if (detected.explanation && detected.explanation.trim()) {
      const expDiv = document.createElement('div');
      /* Usa parseRichText do escopo global se disponível */
      if (typeof parseRichText === 'function') {
        expDiv.innerHTML = parseRichText(detected.explanation);
      } else {
        expDiv.innerHTML = `<p class="rt-p rt-animate">${detected.explanation.replace(/\n/g,'<br>')}</p>`;
      }
      rc.appendChild(expDiv);
    }

    /* Cria o card clicável */
    const primary   = detected.blocks[0];
    const langLabel = LANG_LABELS[primary.lang.toLowerCase()] || primary.lang.toUpperCase();
    const lineCount = primary.code.split('\n').length;
    const isHtml    = ['html','htm'].includes(primary.lang.toLowerCase());
    const isJs      = ['js','javascript','jsx'].includes(primary.lang.toLowerCase());
    const hasPreview = isHtml || isJs;

    const card = document.createElement('div');
    card.className = 'artifact-card';
    card.innerHTML = `
      <div class="artifact-card-header">
        <div class="artifact-card-icon">
          <span class="material-symbols-outlined">code_blocks</span>
        </div>
        <div>
          <div class="artifact-card-title">${langLabel}</div>
          <div class="artifact-card-sub">${lineCount} linha${lineCount !== 1 ? 's' : ''} · ${hasPreview ? 'com preview' : 'código'}</div>
        </div>
      </div>
      <div class="artifact-card-footer">
        <span class="material-symbols-outlined">open_in_new</span>
        Clique para abrir no visualizador de código
      </div>
    `;
    card.addEventListener('click', () => openArtifactPanel(detected));
    rc.appendChild(card);

    document.getElementById('reply-area').scrollTop = 99999;
    if (dot) dot.classList.remove('active');
    if (fstat) fstat.textContent = 'artefato pronto';
    if (onDone) setTimeout(onDone, 300);
  }

  /* ─────────────────────────────────────
     4. ABRIR O PAINEL DE ARTEFATO
     ───────────────────────────────────── */
  function openArtifactPanel(artifact) {
    currentArtifact = artifact;
    const primary   = artifact.blocks[0];
    const langLabel = LANG_LABELS[primary.lang.toLowerCase()] || primary.lang.toUpperCase();

    /* Preenche o código */
    const codeEl = document.getElementById('artifact-code-el');
    codeEl.textContent = primary.code;
    codeEl.className   = `language-${primary.lang}`;

    /* Syntax highlight */
    if (window.hljs) {
      try { hljs.highlightElement(codeEl); } catch(_) {}
    }

    /* Badge de linguagem + contagem de linhas */
    document.getElementById('artifact-lang-badge').textContent = langLabel;
    const lines = primary.code.split('\n').length;
    document.getElementById('artifact-lines-label').textContent = `${lines} linhas`;

    /* Monta o preview no iframe */
    buildIframePreview(primary);

    /* Garante que começa na aba Código */
    switchTab('code');

    /* Exibe o painel */
    document.getElementById('artifact-panel').classList.add('open');
  }

  /* ─────────────────────────────────────
     5. MONTAR CONTEÚDO DO IFRAME
     ───────────────────────────────────── */
  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function buildIframePreview(primary) {
    const iframe = document.getElementById('artifact-iframe');
    const lang   = primary.lang.toLowerCase();
    let   srcdoc;

    if (['html','htm'].includes(lang)) {
      srcdoc = primary.code;
    } else if (['js','javascript','jsx'].includes(lang)) {
      srcdoc = `<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { background:#0d1321; color:#c8d8e8; font-family:monospace;
           padding:20px; margin:0; line-height:1.6; }
    #__output { background:rgba(93,216,192,0.06); border:1px solid rgba(93,216,192,0.2);
                border-radius:8px; padding:14px; margin-top:14px;
                font-size:12px; white-space:pre-wrap; min-height:40px; }
    #__label  { font-size:10px; letter-spacing:.15em; text-transform:uppercase;
                color:rgba(93,216,192,0.5); margin-bottom:6px; }
  </style>
</head>
<body>
  <div id="__label">saída do console</div>
  <div id="__output"></div>
  <script>
    (function(){
      const out = document.getElementById('__output');
      const orig = console.log.bind(console);
      console.log = function(...a){
        orig(...a);
        out.textContent += a.map(x=>typeof x==='object'?JSON.stringify(x,null,2):String(x)).join(' ')+'\\n';
      };
      try { ${primary.code} }
      catch(e){ out.textContent += '\\n⚠ '+e.message; out.style.color='rgba(255,120,120,.8)'; }
    })();
  <\/script>
</body>
</html>`;
    } else {
      /* Para outras linguagens: exibe o código formatado */
      srcdoc = `<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"><\/script>
  <style>
    body { margin:0; background:#0d1117; }
    pre  { margin:0; padding:20px; min-height:100vh; }
    code { font-size:12px !important; line-height:1.7 !important; }
  </style>
</head>
<body>
  <pre><code class="language-${primary.lang}">${escapeHtml(primary.code)}</code></pre>
  <script>hljs.highlightAll();<\/script>
</body>
</html>`;
    }

    iframe.srcdoc = srcdoc;
  }

  /* ─────────────────────────────────────
     6. TROCAR ABAS
     ───────────────────────────────────── */
  function switchTab(tab) {
    const codeView    = document.getElementById('artifact-code-view');
    const previewView = document.getElementById('artifact-preview-view');
    const tabCode     = document.getElementById('tab-code');
    const tabPreview  = document.getElementById('tab-preview');

    if (tab === 'code') {
      codeView.style.display    = 'flex';
      previewView.style.display = 'none';
      tabCode.classList.add('active');
      tabPreview.classList.remove('active');
    } else {
      codeView.style.display    = 'none';
      previewView.style.display = 'block';
      tabCode.classList.remove('active');
      tabPreview.classList.add('active');
    }
  }

  /* ─────────────────────────────────────
     7. FECHAR PAINEL
     ───────────────────────────────────── */
  function closeArtifactPanel() {
    document.getElementById('artifact-panel').classList.remove('open');
    /* Limpa o iframe para parar JS em execução */
    document.getElementById('artifact-iframe').srcdoc = '';
    currentArtifact = null;
  }

  /* ─────────────────────────────────────
     8. EVENTOS DOS BOTÕES
     ───────────────────────────────────── */
  document.getElementById('artifact-close').addEventListener('click', closeArtifactPanel);
  document.getElementById('tab-code').addEventListener('click', () => switchTab('code'));
  document.getElementById('tab-preview').addEventListener('click', () => switchTab('preview'));

  document.getElementById('artifact-copy-btn').addEventListener('click', () => {
    if (!currentArtifact) return;
    const code = currentArtifact.blocks[0].code;
    navigator.clipboard.writeText(code).then(() => {
      const btn  = document.getElementById('artifact-copy-btn');
      const orig = btn.innerHTML;
      btn.innerHTML = '<span class="material-symbols-outlined">check</span> Copiado!';
      btn.style.color = '#5dd8c0';
      setTimeout(() => { btn.innerHTML = orig; btn.style.color = ''; }, 2000);
    }).catch(() => {
      /* Fallback para navegadores sem clipboard API */
      const ta = document.createElement('textarea');
      ta.value = currentArtifact.blocks[0].code;
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta);
    });
  });

  /* ─────────────────────────────────────
     9. INTERCEPTA renderRichReply
     Sobrescreve a função global para
     checar se há código antes de renderizar
     ───────────────────────────────────── */
  const _origRender = window.renderRichReply;

  window.renderRichReply = function (md, onDone) {
    const detected = detectCodeBlocks(md);
    if (detected) {
      renderArtifactReply(detected, onDone);
    } else {
      _origRender(md, onDone);
    }
  };

})();
</script>
<script>
(function () {
  'use strict';
 
  /* ──────────────────────────────────────────────────────────────
     ESTADO INTERNO
  ────────────────────────────────────────────────────────────── */
  let lastAIText    = '';   // última resposta de texto da IA
  let capturedImage = null; // { base64, mime } — espelho do pendingImage
 
  /* ──────────────────────────────────────────────────────────────
     ESPELHA A IMAGEM PENDENTE (sem depender do escopo externo)
     Roda em capture phase → antes do handler original do img-input
  ────────────────────────────────────────────────────────────── */
  document.getElementById('file-input').addEventListener('change', function () {
    const file = this.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      capturedImage = { base64: e.target.result.split(',')[1], mime: file.type };
    };
    reader.readAsDataURL(file);
  }, true);
 
  /* ──────────────────────────────────────────────────────────────
     CAPTURA A ÚLTIMA RESPOSTA DA IA
     Sobrepõe saveToHistory (função global do app)
  ────────────────────────────────────────────────────────────── */
  const _origSave = window.saveToHistory;
  window.saveToHistory = function (q, a) {
    if (_origSave) _origSave(q, a);
    // Ignora marcadores como "[imagem gerada]" ou "[site aberto: ...]"
    if (a && !a.startsWith('[')) lastAIText = a;
  };
 
  /* ──────────────────────────────────────────────────────────────
     CARREGAMENTO LAZY DE LIBS (só quando realmente necessário)
  ────────────────────────────────────────────────────────────── */
  const LIB = {
    jspdf: 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js',
    xlsx:  'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js',
  };
  function loadLib(src) {
    return new Promise(resolve => {
      if (document.querySelector(`script[src="${src}"]`)) { resolve(); return; }
      const s = document.createElement('script');
      s.src = src; s.onload = resolve;
      document.head.appendChild(s);
    });
  }
 
  /* ──────────────────────────────────────────────────────────────
     DETECÇÃO DE COMANDOS DE ARQUIVO
  ────────────────────────────────────────────────────────────── */
  const ACTION_RE = /\b(transform[ae]r?|convert[ae]r?|export[ae]r?|salv[ae]r?|ger[ae]r?|cri[ae]r?|baixar?|faz[ae]r?|quero|gera|cria|converte)\b/i;
  const TYPE_MAP  = [
    { re: /\b(em\s+pdf|para\s+pdf|como\s+pdf|\.pdf|um\s+pdf|gerar?\s+pdf|pdf\s+d[ao])\b/i,             type: 'pdf'  },
    { re: /\b(em\s+txt|para\s+txt|como\s+txt|\.txt|texto\s+puro|arquivo\s+de\s+texto)\b/i,             type: 'txt'  },
    { re: /\b(excel|xlsx|\.xlsx|planilha)\b/i,                                                          type: 'xlsx' },
    { re: /\b(word|docx|\.docx?|documento\s+word)\b/i,                                                  type: 'docx' },
  ];
 
  function detectFileCmd(text) {
    if (!ACTION_RE.test(text)) return null;
    for (const t of TYPE_MAP) if (t.re.test(text)) return t.type;
    return null;
  }
 
  /* ──────────────────────────────────────────────────────────────
     GERADOR — PDF (suporta imagem e texto)
  ────────────────────────────────────────────────────────────── */
  async function makePDF(source) {
    await loadLib(LIB.jspdf);
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'p', unit: 'mm', format: 'a4' });
    const W = pdf.internal.pageSize.getWidth();
    const H = pdf.internal.pageSize.getHeight();
    const M = 18;
 
    if (source.type === 'image') {
      /* ── Imagem centralizada na página ── */
      const img = new Image();
      img.src = `data:${source.mime};base64,${source.base64}`;
      await new Promise(r => { img.onload = r; });
      const ratio = Math.min((W - M * 2) / img.width, (H - M * 2) / img.height);
      const iw = img.width * ratio, ih = img.height * ratio;
      const fmt = source.mime.includes('png') ? 'PNG' : 'JPEG';
      pdf.addImage(img, fmt, (W - iw) / 2, (H - ih) / 2, iw, ih);
 
    } else {
      /* ── Cabeçalho estilizado ── */
      pdf.setFillColor(13, 19, 33);
      pdf.rect(0, 0, W, 26, 'F');
      pdf.setFont('helvetica', 'bold');
      pdf.setFontSize(13);
      pdf.setTextColor(93, 216, 192);
      pdf.text('Gênesis AI', M, 16);
      pdf.setFontSize(8);
      pdf.setFont('helvetica', 'normal');
      pdf.setTextColor(130, 160, 190);
      pdf.text(new Date().toLocaleString('pt-BR'), W - M, 16, { align: 'right' });
 
      /* ── Corpo do texto ── */
      pdf.setFont('helvetica', 'normal');
      pdf.setFontSize(11);
      pdf.setTextColor(40, 40, 50);
 
      const text  = source.text || '';
      const lines = pdf.splitTextToSize(text, W - M * 2);
      let y = 38;
 
      for (const line of lines) {
        if (y > H - M) { pdf.addPage(); y = M; }
        pdf.text(line, M, y);
        y += 6.5;
      }
    }
 
    const name = `genesis-${Date.now()}.pdf`;
    pdf.save(name);
    return name;
  }
 
  /* ──────────────────────────────────────────────────────────────
     GERADOR — TXT (zero dependências)
  ────────────────────────────────────────────────────────────── */
  function makeTXT(text) {
    const header = `Gênesis AI — ${new Date().toLocaleString('pt-BR')}\n${'─'.repeat(40)}\n\n`;
    const blob   = new Blob([header + text], { type: 'text/plain;charset=utf-8' });
    const name   = `genesis-${Date.now()}.txt`;
    triggerDL(blob, name);
    return name;
  }
 
  /* ──────────────────────────────────────────────────────────────
     GERADOR — Excel (.xlsx)
  ────────────────────────────────────────────────────────────── */
  async function makeXLSX(text) {
    await loadLib(LIB.xlsx);
    const XL = window.XLSX;
    const wb = XL.utils.book_new();
    const lines = text.split('\n').filter(l => l.trim());
 
    let rows;
    if (lines.some(l => l.includes('|'))) {
      /* Tabela markdown → colunas */
      rows = lines
        .filter(l => !/^\|[-\s|]+\|$/.test(l))
        .map(l => l.split('|').filter(c => c.trim()).map(c => c.trim()));
    } else if (lines.some(l => l.includes('\t'))) {
      rows = lines.map(l => l.split('\t'));
    } else {
      rows = lines.map(l => [l]);
    }
 
    const ws = XL.utils.aoa_to_sheet(rows);
    /* Largura automática nas colunas */
    const colW = rows[0]?.map((_, ci) => ({
      wch: Math.max(...rows.map(r => (r[ci] || '').toString().length), 10)
    }));
    if (colW) ws['!cols'] = colW;
 
    XL.utils.book_append_sheet(wb, ws, 'Gênesis AI');
    const name = `genesis-${Date.now()}.xlsx`;
    XL.writeFile(wb, name);
    return name;
  }
 
  /* ──────────────────────────────────────────────────────────────
     GERADOR — Word (.doc via namespace MSWord)
     Abre corretamente no Word, LibreOffice, Google Docs
  ────────────────────────────────────────────────────────────── */
  function makeDOC(text) {
    function esc(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    const body = text.split('\n')
      .map(l => l.trim() ? `<p>${esc(l)}</p>` : '<p>&nbsp;</p>')
      .join('\n');
 
    const html = `<html xmlns:o="urn:schemas-microsoft-com:office:office"
      xmlns:w="urn:schemas-microsoft-com:office:word"
      xmlns="http://www.w3.org/TR/REC-html40">
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: Calibri, sans-serif; font-size: 11pt;
           color: #1a1a2e; margin: 2cm 2.5cm; line-height: 1.65; }
    h1   { font-size: 15pt; color: #0d6e6e; border-bottom: 1pt solid #cde;
           padding-bottom: 6pt; margin-bottom: 14pt; }
    p    { margin: 4pt 0; }
  </style>
</head>
<body>
  <h1>Gênesis AI &mdash; ${new Date().toLocaleString('pt-BR')}</h1>
  ${body}
</body>
</html>`;
 
    const blob = new Blob([html], { type: 'application/msword' });
    const name = `genesis-${Date.now()}.doc`;
    triggerDL(blob, name);
    return name;
  }
 
  /* ──────────────────────────────────────────────────────────────
     UTILITÁRIO — dispara download via <a>
  ────────────────────────────────────────────────────────────── */
  function triggerDL(blob, name) {
    const url = URL.createObjectURL(blob);
    const a   = document.createElement('a');
    a.href = url; a.download = name;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 8000);
  }
 
  /* ──────────────────────────────────────────────────────────────
     UI — Card "arquivo pronto" exibido na gaveta
  ────────────────────────────────────────────────────────────── */
  const TYPE_META = {
    pdf:  { icon: 'picture_as_pdf', label: 'PDF',   color: '#ff8080' },
    txt:  { icon: 'description',    label: 'TXT',   color: '#5dd8c0' },
    xlsx: { icon: 'table_chart',    label: 'Excel', color: '#6bcb77' },
    docx: { icon: 'article',        label: 'Word',  color: '#6699ff' },
  };
 
  function showFileCard(filename, type) {
    const rc  = document.getElementById('rich-content');
    const rh  = document.getElementById('reply-hint');
    const dot = document.getElementById('live-dot');
    const fs  = document.getElementById('footer-status');
    const m   = TYPE_META[type] || { icon: 'download', label: type.toUpperCase(), color: '#5dd8c0' };
 
    if (rh)  rh.style.display = 'none';
    rc.innerHTML = '';
 
    rc.innerHTML = `
      <div style="display:flex;flex-direction:column;gap:16px;animation:fadeUp .4s cubic-bezier(.16,1,.3,1) both">
 
        <!-- Ícone + nome -->
        <div style="display:flex;align-items:center;gap:14px">
          <div style="width:48px;height:48px;border-radius:13px;flex-shrink:0;
            background:${m.color}1a;border:1px solid ${m.color}44;
            display:flex;align-items:center;justify-content:center">
            <span class="material-symbols-outlined" style="font-size:24px;color:${m.color}">${m.icon}</span>
          </div>
          <div>
            <div style="font-size:15px;font-weight:600;color:rgba(230,245,255,.95);margin-bottom:3px">
              Arquivo ${m.label} gerado com sucesso!
            </div>
            <div style="font-size:10px;font-family:'Space Mono',monospace;
              color:rgba(255,255,255,.28);letter-spacing:.07em">${filename}</div>
          </div>
        </div>
 
        <!-- Instrução -->
        <div style="font-size:13.5px;line-height:1.7;color:rgba(175,205,225,.78)">
          O download foi iniciado automaticamente. Verifique sua
          <strong style="color:rgba(215,235,255,.9)">pasta de downloads</strong>.
        </div>
 
        <!-- Dica extra -->
        <div style="display:flex;align-items:flex-start;gap:9px;
          background:rgba(93,216,192,.05);border:1px solid rgba(93,216,192,.14);
          border-radius:10px;padding:11px 14px;
          font-size:12px;color:rgba(140,180,200,.65);line-height:1.6">
          <span class="material-symbols-outlined" style="font-size:16px;color:rgba(93,216,192,.5);flex-shrink:0;margin-top:1px">info</span>
          <span>Peça outra resposta à IA e use comandos como <em>"salve como PDF"</em>,
          <em>"exportar em Excel"</em> ou <em>"gerar TXT"</em> para exportar qualquer conteúdo.</span>
        </div>
 
      </div>`;
 
    if (dot) dot.classList.remove('active');
    if (fs)  fs.textContent = `${m.label} pronto`;
  }
 
  /* ──────────────────────────────────────────────────────────────
     INTERCEPTA O BOTÃO DE ENVIO (capture phase = roda antes do Gemini)
  ────────────────────────────────────────────────────────────── */
  document.getElementById('send-btn').addEventListener('click', async function (e) {
    const inputEl  = document.getElementById('msg-input');
    const txt      = inputEl.value.trim();
    if (!txt) return;
 
    const fileType  = detectFileCmd(txt);
    if (!fileType) return;
 
    /* Verifica contexto disponível para exportar */
    const isImgPDF = /imagem/i.test(txt) && fileType === 'pdf' && capturedImage;
    const hasText  = lastAIText.trim().length > 30;
 
    if (!isImgPDF && !hasText) return; // sem conteúdo para gerar arquivo → deixa Gemini responder normalmente
 
    /* ── A partir daqui: interceptamos o evento ── */
    e.stopImmediatePropagation();
 
    inputEl.value = '';
    document.getElementById('send-btn').disabled = true;
    if (typeof setState  === 'function') setState('thinking');
    if (typeof openPanel === 'function') openPanel();
 
    const rh = document.getElementById('reply-hint');
    const rc = document.getElementById('rich-content');
    if (rc) rc.innerHTML = '';
    if (rh) { rh.style.display = 'block'; rh.textContent = 'Gerando arquivo...'; }
 
    try {
      let filename;
 
      if (isImgPDF) {
        /* Imagem → PDF */
        filename = await makePDF({ type: 'image', base64: capturedImage.base64, mime: capturedImage.mime });
        capturedImage = null; // consome a imagem capturada
 
        /* Reseta visual do botão de imagem */
        const imgBtn = document.getElementById('img-btn');
        if (imgBtn) {
          imgBtn.style.borderColor = 'rgba(255,255,255,0.12)';
          imgBtn.style.color       = 'rgba(255,255,255,0.45)';
          imgBtn.style.background  = 'transparent';
          imgBtn.title             = 'Enviar imagem';
        }
      } else if (fileType === 'pdf')  { filename = await makePDF({ type: 'text', text: lastAIText }); }
        else if (fileType === 'txt')  { filename = makeTXT(lastAIText); }
        else if (fileType === 'xlsx') { filename = await makeXLSX(lastAIText); }
        else if (fileType === 'docx') { filename = makeDOC(lastAIText); }
 
      if (typeof setState       === 'function') setState('responding');
      if (typeof saveToHistory  === 'function') saveToHistory(txt, `[arquivo gerado: ${filename}]`);
      showFileCard(filename, fileType);
 
    } catch (err) {
      const rh = document.getElementById('reply-hint');
      if (rh) { rh.style.display = 'block'; rh.textContent = `⚠ ${err.message}`; }
      console.error('[FileGen]', err);
    } finally {
      setTimeout(() => {
        if (typeof setState === 'function') setState('idle');
        document.getElementById('send-btn').disabled = false;
      }, 900);
    }
 
  }, true /* ← capture: executa ANTES dos handlers do Gemini e do vídeo */);
 
})();

/* ── MOBILE WELCOME: mostra/esconde com o painel ── */
(function () {
  const mw = document.getElementById('mobile-welcome');
  if (!mw) return;

  const _origOpen  = window.openPanel;
  const _origClose = window.closeNeuralPanel;

  window.openPanel = function () {
    if (_origOpen) _origOpen();
    mw.classList.add('mw-hidden');
  };

  window.closeNeuralPanel = function () {
    if (_origClose) _origClose();
    mw.classList.remove('mw-hidden');
  };
})();
</script>
<script>
/* ═══════════════════════════════════════════════════════════════
   MÓDULO: Gemini Live Mode
   Requer: netlify/functions/gemini-live-key.js
   Modelo: gemini-2.0-flash-live-001 (disponível no free tier)
═══════════════════════════════════════════════════════════════ */
(function () {
  'use strict';

const LIVE_MODEL = 'models/gemini-2.0-flash';
const WS_BASE    = `wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1beta.GenerativeService.BidiGenerateContent`;
  
  let ws            = null;
  let liveActive    = false;
  let audioCtx      = null;
  let micStream     = null;
  let processor     = null;
  let sourceNode    = null;
  let cachedKey     = null;
  let currentAiEl   = null;
  let currentUserEl = null;
  let aiText        = '';
  let userText      = '';

  const liveBtn    = document.getElementById('live-btn');
  const rc         = document.getElementById('rich-content');
  const rh         = document.getElementById('reply-hint');
  const liveDotEl  = document.getElementById('live-dot');
  const footerStat = document.getElementById('footer-status');

  /* ─── Busca chave via Netlify Function ─── */
  async function fetchKey() {
    if (cachedKey) return cachedKey;
    const res  = await fetch('/.netlify/functions/gemini-live-key');
    const data = await res.json();
    if (!data.key) throw new Error('Chave API não encontrada');
    cachedKey = data.key;
    return cachedKey;
  }

  /* ─── Conversão Float32 → PCM Int16 → Base64 ─── */
  function f32ToI16(buf) {
    const out = new Int16Array(buf.length);
    for (let i = 0; i < buf.length; i++) {
      const s = Math.max(-1, Math.min(1, buf[i]));
      out[i]  = s < 0 ? s * 32768 : s * 32767;
    }
    return out;
  }

  function ab2b64(ab) {
    const u8 = new Uint8Array(ab);
    let s = '';
    for (let i = 0; i < u8.length; i++) s += String.fromCharCode(u8[i]);
    return btoa(s);
  }

  /* ─── Cria elemento de mensagem no painel ─── */
  function createMsgEl(role) {
    const el = document.createElement('div');
    el.className = `live-msg live-msg-${role}`;
    el.innerHTML =
      `<span class="live-msg-role">${role === 'user' ? 'Você' : 'Gênesis'}</span>` +
      `<span class="live-msg-text"></span>`;
    rc.appendChild(el);
    document.getElementById('reply-area').scrollTop = 99999;
    return el;
  }

  /* ─── INICIAR LIVE ─── */
  async function startLive() {
    if (liveActive) return;

    /* Para o mic principal se estiver escutando */
    if (typeof isListening !== 'undefined' && isListening) {
      if (typeof stopListening === 'function') stopListening(false);
    }

    liveBtn.classList.add('live-active');
    liveBtn.title = 'Parar Modo Live';
    if (typeof openPanel === 'function') openPanel();
    if (typeof setState  === 'function') setState('thinking');

    rc.innerHTML = '';
    if (rh) { rh.style.display = 'block'; rh.textContent = 'Conectando ao servidor Live…'; }

    /* Busca chave */
    let key;
    try { key = await fetchKey(); }
    catch (err) {
      showErr('⚠ ' + err.message);
      resetBtn();
      if (typeof setState === 'function') setState('idle');
      return;
    }

    /* Abre WebSocket */
    ws = new WebSocket(`${WS_BASE}?key=${key}`);

    ws.onopen = () => {
      ws.send(JSON.stringify({
        setup: {
          model: LIVE_MODEL,
          generationConfig: { responseModalities: ['TEXT'] },
          systemInstruction: {
            parts: [{
              text: 'Você é Gênesis, uma inteligência artificial desenvolvida pela FelpsAi. ' +
                    'Responda sempre em português brasileiro, de forma natural e conversacional. ' +
                    'Seja conciso nas respostas.'
            }]
          }
        }
      }));
    };

    ws.onmessage = async (ev) => {
      const raw = ev.data instanceof Blob ? await ev.data.text() : ev.data;
      let msg;
      try { msg = JSON.parse(raw); } catch { return; }

      /* ── Setup concluído: inicia captura de áudio ── */
      if (msg.setupComplete) {
        liveActive = true;
        if (rh) rh.style.display = 'none';
        if (liveDotEl) liveDotEl.classList.add('active');
        if (footerStat) footerStat.textContent = 'live ativo';
        if (typeof setState === 'function') setState('idle');

        const hdr = document.createElement('div');
        hdr.className = 'live-header';
        hdr.innerHTML = `<span class="material-symbols-outlined">stream</span> Modo Live Ativo — fale agora`;
        rc.appendChild(hdr);

        try { await startAudio(); }
        catch (err) {
          showErr('⚠ Microfone: ' + err.message);
          stopLive();
        }
        return;
      }

      /* ── Transcrição da voz do usuário ── */
      const inputTrans = msg.serverContent?.inputTranscription;
      if (inputTrans?.text) {
        userText = inputTrans.text;
        if (!currentUserEl) currentUserEl = createMsgEl('user');
        currentUserEl.querySelector('.live-msg-text').textContent = userText;
        document.getElementById('reply-area').scrollTop = 99999;
      }

      /* ── Resposta textual do modelo (streaming) ── */
      const parts = msg.serverContent?.modelTurn?.parts;
      if (parts) {
        for (const p of parts) {
          if (!p.text) continue;
          if (!currentAiEl) {
            currentAiEl = createMsgEl('ai');
            if (typeof setState === 'function') setState('responding');
          }
          aiText += p.text;
          currentAiEl.querySelector('.live-msg-text').textContent = aiText;
          document.getElementById('reply-area').scrollTop = 99999;
        }
      }

      /* ── Turno completo ── */
      if (msg.serverContent?.turnComplete) {
        if (aiText && typeof saveToHistory === 'function') {
          saveToHistory(userText || '(voz)', aiText);
        }
        currentAiEl   = null;
        currentUserEl = null;
        aiText        = '';
        userText      = '';
        if (typeof setState === 'function') setState('idle');
      }
    };

    ws.onerror = () => { if (liveActive) stopLive(); };
    ws.onclose = () => {
    console.error("WebSocket Fechado! Código:", ev.code, "Motivo:", ev.reason);
      
      if (liveActive) {
        stopLive();
      } else {
    // Conexão rejeitada antes do setup completar
    resetBtn();
    if (typeof setState === 'function') setState('idle');
    document.getElementById('send-btn').disabled = false;
    const rh = document.getElementById('reply-hint');
    if (rh) { rh.style.display = 'block'; rh.textContent = '⚠ Falha ao conectar ao servidor Live. Verifique se o modelo está disponível na sua chave API.'; }
  }
};
  }

  /* ─── CAPTURA DE ÁUDIO → PCM 16k ─── */
  async function startAudio() {
    micStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        channelCount:     1,
        sampleRate:       16000,
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl:  true,
      }
    });

    audioCtx   = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
    sourceNode = audioCtx.createMediaStreamSource(micStream);
    processor  = audioCtx.createScriptProcessor(2048, 1, 1);

    processor.onaudioprocess = (ev) => {
      if (!ws || ws.readyState !== WebSocket.OPEN || !liveActive) return;

      const f32 = ev.inputBuffer.getChannelData(0);
      const b64 = ab2b64(f32ToI16(f32).buffer);

      ws.send(JSON.stringify({
        realtimeInput: {
          mediaChunks: [{ mimeType: 'audio/pcm;rate=16000', data: b64 }]
        }
      }));

      /* Atualiza volume na esfera neural */
      let sum = 0;
      for (let i = 0; i < f32.length; i++) sum += f32[i] * f32[i];
      audioVolume = Math.min(1, Math.sqrt(sum / f32.length) * 10);
    };

    sourceNode.connect(processor);
    processor.connect(audioCtx.destination);
  }

  /* ─── PARAR LIVE ─── */
  function stopLive() {
    liveActive    = false;
    currentAiEl   = null;
    currentUserEl = null;
    aiText        = '';
    userText      = '';

    const safeDisconnect = (node) => { try { node?.disconnect(); } catch (_) {} };
    safeDisconnect(processor);  processor  = null;
    safeDisconnect(sourceNode); sourceNode = null;
    if (audioCtx)  { try { audioCtx.close(); } catch (_) {} audioCtx = null; }
    if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
    if (ws)        { try { ws.close();        } catch (_) {} ws       = null; }

    audioVolume = 0; // reseta volume da esfera

    resetBtn();
    if (liveDotEl)  liveDotEl.classList.remove('active');
    if (footerStat) footerStat.textContent = 'live encerrado';
    if (typeof setState === 'function') setState('idle');

    const end = document.createElement('div');
    end.className = 'live-end-msg';
    end.textContent = '— sessão encerrada —';
    rc.appendChild(end);
    document.getElementById('reply-area').scrollTop = 99999;

    setTimeout(() => {
      if (footerStat) footerStat.textContent = 'sistema pronto';
    }, 3000);
  }

  /* ─── Helpers visuais ─── */
  function resetBtn() {
    liveBtn.classList.remove('live-active');
    liveBtn.title = 'Modo Live — conversação em tempo real';
  }

  function showErr(msg) {
    if (rh) { rh.style.display = 'block'; rh.textContent = msg; }
  }

  /* ─── Bind ─── */
  liveBtn.addEventListener('click', () => liveActive ? stopLive() : startLive());

})();
</script>
