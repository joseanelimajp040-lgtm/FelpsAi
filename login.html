<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FelpsAi — Acesso</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet"/>
<style>
:root {
  --obsidian: #03050a;
  --midnight: #0a0e1a;
  --surface: #0d1321;
  --surface2: #111827;
  --accent: #5dd8c0;
  --accent-dim: rgba(93,216,192,0.15);
  --accent-border: rgba(93,216,192,0.3);
  --border: rgba(255,255,255,0.07);
  --border-hover: rgba(255,255,255,0.14);
  --text: #e0e6ed;
  --text-muted: rgba(255,255,255,0.38);
  --text-dim: rgba(255,255,255,0.22);
  --error: #ff5050;
  --google-blue: #4285F4;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body, html {
  height: 100%;
  background: var(--obsidian);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  overflow: hidden;
}

/* ── GRID ROOT ── */
.login-root {
  display: grid;
  grid-template-columns: 1fr 1fr;
  height: 100vh;
  position: relative;
}

/* ── BACKGROUND NOISE + GLOW ── */
.login-root::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 20% 50%, rgba(93,216,192,0.04) 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 80% 30%, rgba(93,216,192,0.03) 0%, transparent 60%),
    radial-gradient(circle at 50% 50%, #0d1321 0%, #03050a 100%);
  pointer-events: none;
  z-index: 0;
}

/* ── LEFT PANEL ── */
.left-panel {
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 36px 64px;
  position: relative;
  z-index: 1;
  border-right: 1px solid var(--border);
  overflow: hidden;
}

/* brand */
.brand {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 32px;
}
.brand-logo {
  width: 36px; height: 36px;
  border: 1.5px solid var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  transform: rotate(45deg);
  position: relative;
  flex-shrink: 0;
}
.brand-logo::after {
  content: '';
  width: 9px; height: 9px;
  background: var(--accent);
  border-radius: 50%;
  box-shadow: 0 0 12px var(--accent);
  animation: pulse-dot 2s infinite ease-in-out;
}
@keyframes pulse-dot {
  0%,100%{ transform: scale(1); opacity: 0.8; }
  50%{ transform: scale(1.3); opacity: 1; }
}
.brand-name {
  font-size: 18px; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: #fff;
}

/* headline */
.headline {
  margin-bottom: 24px;
}
.headline h1 {
  font-size: 30px;
  font-weight: 600;
  line-height: 1.25;
  letter-spacing: -0.02em;
  color: #fff;
  margin-bottom: 10px;
}
.headline p {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.6;
}

/* google btn */
.btn-google {
  width: 100%;
  display: flex; align-items: center; justify-content: center; gap: 12px;
  padding: 14px 20px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border-hover);
  border-radius: 12px;
  color: var(--text);
  font-size: 14px; font-weight: 500;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
  font-family: 'Inter', sans-serif;
  letter-spacing: 0.01em;
}
.btn-google:hover {
  background: rgba(255,255,255,0.07);
  border-color: rgba(255,255,255,0.2);
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.g-icon {
  width: 18px; height: 18px; flex-shrink: 0;
}

/* divider */
.divider {
  display: flex; align-items: center; gap: 16px;
  margin: 18px 0;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}
.divider span {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--text-dim);
  font-family: 'Space Mono', monospace;
  white-space: nowrap;
}

/* form fields */
.field-group {
  display: flex; flex-direction: column;
  gap: 14px;
  margin-bottom: 8px;
}
.field-label {
  font-size: 12px; font-weight: 500;
  color: var(--text-muted);
  letter-spacing: 0.04em;
  margin-bottom: 6px;
  display: block;
}
.field-wrap {
  position: relative;
}
.field-wrap .f-icon {
  position: absolute;
  left: 14px; top: 50%; transform: translateY(-50%);
  font-size: 18px;
  color: var(--text-dim);
  pointer-events: none;
}
.field-wrap input {
  width: 100%;
  padding: 14px 16px 14px 44px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-size: 14px;
  font-family: 'Inter', sans-serif;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
}
.field-wrap input::placeholder { color: var(--text-dim); }
.field-wrap input:focus {
  border-color: var(--accent-border);
  background: rgba(93,216,192,0.03);
  box-shadow: 0 0 0 3px rgba(93,216,192,0.07);
}
.field-wrap .toggle-pw {
  position: absolute;
  right: 14px; top: 50%; transform: translateY(-50%);
  background: none; border: none;
  color: var(--text-dim);
  cursor: pointer;
  display: flex;
  transition: color 0.2s;
}
.field-wrap .toggle-pw:hover { color: var(--text-muted); }
.field-wrap .toggle-pw .material-symbols-outlined { font-size: 18px; }

.forgot-link {
  display: block;
  text-align: right;
  font-size: 12px;
  color: var(--text-dim);
  text-decoration: none;
  margin-top: -6px;
  margin-bottom: 6px;
  transition: color 0.2s;
}
.forgot-link:hover { color: var(--accent); }

/* CTA button */
.btn-cta {
  width: 100%;
  padding: 15px;
  background: var(--accent);
  border: none; border-radius: 12px;
  color: var(--obsidian);
  font-size: 15px; font-weight: 600;
  font-family: 'Inter', sans-serif;
  letter-spacing: 0.01em;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
  margin-top: 8px;
  box-shadow: 0 4px 24px rgba(93,216,192,0.22);
}
.btn-cta:hover {
  background: #73ecd4;
  transform: translateY(-1px);
  box-shadow: 0 8px 32px rgba(93,216,192,0.3);
}
.btn-cta:active { transform: translateY(0); }
.btn-cta .material-symbols-outlined { font-size: 18px; }

.register-link {
  text-align: center;
  font-size: 13px;
  color: var(--text-dim);
  margin-top: 14px;
}
.register-link a {
  color: var(--accent);
  text-decoration: none;
  font-weight: 500;
}
.register-link a:hover { text-decoration: underline; }

/* ── RIGHT PANEL ── */
.right-panel {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 48px;
  position: relative;
  z-index: 1;
  overflow: hidden;
}

/* Mini sphere canvas */
.sphere-preview {
  width: 320px; height: 320px;
  position: relative;
  margin-bottom: 32px;
}
.sphere-preview canvas {
  width: 100%; height: 100%;
}
.sphere-preview .sphere-label {
  position: absolute;
  bottom: -8px;
  left: 50%; transform: translateX(-50%);
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(93,216,192,0.45);
  white-space: nowrap;
}

/* stats strip */
.stats-strip {
  display: flex;
  gap: 12px;
  margin-bottom: 32px;
  width: 100%;
  max-width: 360px;
}
.stat-card {
  flex: 1;
  background: rgba(10,14,26,0.85);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 12px;
  text-align: center;
  backdrop-filter: blur(12px);
  transition: border-color 0.2s;
}
.stat-card:hover { border-color: var(--accent-border); }
.stat-value {
  font-size: 22px;
  font-weight: 600;
  color: var(--accent);
  line-height: 1;
  margin-bottom: 4px;
  font-family: 'Space Mono', monospace;
}
.stat-label {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--text-dim);
}

/* testimonial */
.testimonial {
  max-width: 360px;
  background: rgba(10,14,26,0.7);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px 22px;
  backdrop-filter: blur(14px);
}
.testimonial blockquote {
  font-size: 13px;
  font-style: italic;
  color: rgba(224,230,237,0.7);
  line-height: 1.7;
  margin-bottom: 14px;
}
.testimonial-author {
  display: flex;
  align-items: center;
  gap: 10px;
}
.author-avatar {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: linear-gradient(135deg, rgba(93,216,192,0.5), rgba(93,216,192,0.1));
  border: 1px solid var(--accent-border);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 600;
  color: var(--accent);
  flex-shrink: 0;
}
.author-info .name {
  font-size: 13px; font-weight: 600; color: #fff;
}
.author-info .role {
  font-size: 10px;
  color: var(--text-dim);
  font-family: 'Space Mono', monospace;
  letter-spacing: 0.06em;
}

/* "ao vivo" badge */
.live-badge {
  position: absolute;
  top: 32px; right: 32px;
  display: flex; align-items: center; gap: 8px;
  background: rgba(10,14,26,0.8);
  border: 1px solid rgba(93,216,192,0.2);
  border-radius: 100px;
  padding: 7px 14px 7px 10px;
  font-size: 10px;
  font-family: 'Space Mono', monospace;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--accent);
  backdrop-filter: blur(10px);
}
.live-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
  animation: live-pulse 1.8s ease-in-out infinite;
}
@keyframes live-pulse {
  0%,100%{ opacity: 1; transform: scale(1); }
  50%{ opacity: 0.5; transform: scale(0.8); }
}

/* ── ENTRY ANIMATIONS ── */
.left-panel > * {
  opacity: 0;
  transform: translateY(14px);
  animation: fadeUp 0.55s cubic-bezier(0.16,1,0.3,1) forwards;
}
.left-panel > *:nth-child(1) { animation-delay: 0.05s; }
.left-panel > *:nth-child(2) { animation-delay: 0.12s; }
.left-panel > *:nth-child(3) { animation-delay: 0.19s; }
.left-panel > *:nth-child(4) { animation-delay: 0.26s; }
.left-panel > *:nth-child(5) { animation-delay: 0.33s; }
.left-panel > *:nth-child(6) { animation-delay: 0.40s; }
.left-panel > *:nth-child(7) { animation-delay: 0.47s; }
.left-panel > *:nth-child(8) { animation-delay: 0.54s; }

.right-panel > * {
  opacity: 0;
  animation: fadeIn 0.8s cubic-bezier(0.16,1,0.3,1) forwards;
}
.right-panel > *:nth-child(1) { animation-delay: 0.2s; }
.right-panel > *:nth-child(2) { animation-delay: 0.35s; }
.right-panel > *:nth-child(3) { animation-delay: 0.50s; }
.right-panel > *:nth-child(4) { animation-delay: 0.65s; }

@keyframes fadeUp {
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  to { opacity: 1; }
}

/* ── MOBILE ── */
@media (max-width: 860px) {
  .login-root { grid-template-columns: 1fr; overflow-y: auto; }
  .right-panel { display: none; }
  .left-panel { padding: 36px 28px; overflow-y: visible; }
  body, html { overflow: auto; }
}
</style>
</head>
<body>
<div class="login-root">

  <!-- ═══ LEFT: FORM ═══ -->
  <div class="left-panel">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-logo"></div>
      <span class="brand-name">FelpsAi</span>
    </div>

    <!-- Headline -->
    <div class="headline">
      <h1>Acesse sua<br>interface neural</h1>
      <p>Entre para conversar com o agente de inteligência avançada.</p>
    </div>

    <!-- Google -->
    <button class="btn-google">
      <svg class="g-icon" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
        <path fill="#FBBC05" d="M3.964 10.71C3.786 10.17 3.682 9.593 3.682 9c0-.593.104-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z"/>
        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/>
      </svg>
      Entrar com Google
    </button>

    <!-- Divider -->
    <div class="divider"><span>ou entre com e-mail</span></div>

    <!-- Fields -->
    <div class="field-group">
      <div>
        <label class="field-label">Usuário</label>
        <div class="field-wrap">
          <span class="f-icon material-symbols-outlined">person</span>
          <input type="text" id="user-field" placeholder="seu usuário" autocomplete="username"/>
        </div>
      </div>
      <div>
        <label class="field-label">Senha</label>
        <div class="field-wrap">
          <span class="f-icon material-symbols-outlined">lock</span>
          <input type="password" id="pw-field" placeholder="••••••••••" autocomplete="current-password"/>
          <button class="toggle-pw" onclick="togglePw()" type="button">
            <span class="material-symbols-outlined" id="pw-icon">visibility</span>
          </button>
        </div>
      </div>
    </div>

    <div id="login-error" style="display:none; font-size:12px; color:#ff5f5f; margin-top:6px; padding:10px 14px; background:rgba(255,80,80,0.07); border:1px solid rgba(255,80,80,0.2); border-radius:10px; display:none;">
      Usuário ou senha incorretos.
    </div>

    <a href="#" class="forgot-link">Esqueceu a senha?</a>

    <button class="btn-cta" onclick="doLogin()">
      <span>Entrar</span>
      <span class="material-symbols-outlined">arrow_forward</span>
    </button>

    <p class="register-link">
      Não tem acesso? <a href="#">Solicitar demo</a>
    </p>

  </div>

  <!-- ═══ RIGHT: VISUAL ═══ -->
  <div class="right-panel">

    <!-- Live badge -->
    <div class="live-badge">
      <div class="live-dot"></div>
      Interface ativa
    </div>

    <!-- Mini sphere -->
    <div class="sphere-preview">
      <canvas id="mini-c"></canvas>
      <div class="sphere-label">núcleo neural · pronto</div>
    </div>

    <!-- Stats -->
    <div class="stats-strip">
      <div class="stat-card">
        <div class="stat-value">∞</div>
        <div class="stat-label">Contexto</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="s-queries">0</div>
        <div class="stat-label">Consultas</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">24/7</div>
        <div class="stat-label">Disponível</div>
      </div>
    </div>


  </div>
</div>

<script>
/* ── TOGGLE PASSWORD ── */
function togglePw() {
  const f = document.getElementById('pw-field');
  const i = document.getElementById('pw-icon');
  if (f.type === 'password') { f.type = 'text'; i.textContent = 'visibility_off'; }
  else { f.type = 'password'; i.textContent = 'visibility'; }
}

/* ── LOGIN ── */
const VALID_USER = 'Felpsc137';
const VALID_PASS = '15696247';
const SESSION_KEY = 'felpsai_auth';

function doLogin() {
  const user = document.getElementById('user-field').value.trim();
  const pass = document.getElementById('pw-field').value;
  const err  = document.getElementById('login-error');

  if (user === VALID_USER && pass === VALID_PASS) {
    err.style.display = 'none';
    sessionStorage.setItem(SESSION_KEY, '1');
    // Animação de saída rápida antes de redirecionar
    document.querySelector('.login-root').style.opacity = '0';
    document.querySelector('.login-root').style.transition = 'opacity 0.4s';
    setTimeout(() => { window.location.href = 'index.html'; }, 420);
  } else {
    err.style.display = 'block';
    document.getElementById('pw-field').value = '';
    document.getElementById('pw-field').focus();
    // shake no form
    const lp = document.querySelector('.left-panel');
    lp.style.animation = 'shake 0.35s ease';
    setTimeout(() => lp.style.animation = '', 360);
  }
}

// Enter no campo dispara login
document.addEventListener('DOMContentLoaded', () => {
  ['user-field','pw-field'].forEach(id => {
    document.getElementById(id)?.addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  });
});

/* shake keyframe via JS (não interfere no CSS) */
const shakeStyle = document.createElement('style');
shakeStyle.textContent = `@keyframes shake {
  0%,100%{ transform: translateX(0); }
  20%{ transform: translateX(-8px); }
  40%{ transform: translateX(7px); }
  60%{ transform: translateX(-5px); }
  80%{ transform: translateX(4px); }
}`;
document.head.appendChild(shakeStyle);

/* ── COUNTER ANIMATION ── */
let q = 0;
const el = document.getElementById('s-queries');
const savedQ = parseInt(localStorage.getItem('felpsai_query_count') || '0');
const target = Math.max(savedQ, 128);
const step = Math.ceil(target / 60);
const counter = setInterval(() => {
  q = Math.min(q + step, target);
  el.textContent = q;
  if (q >= target) clearInterval(counter);
}, 20);

/* ── MINI SPHERE ── */
const canvas = document.getElementById('mini-c');
const ctx = canvas.getContext('2d');
canvas.width = canvas.height = 320;
const W = 320, H = 320, CX = 160, CY = 160, R = 118;

const phi = Math.PI * (3 - Math.sqrt(5));
const N = 500;
const pts = Array.from({ length: N }, (_, i) => {
  const y = 1 - (i / (N-1)) * 2;
  const rr = Math.sqrt(1 - y*y);
  const th = phi * i;
  const d = 0.72 + Math.random() * 0.28;
  return {
    sx: Math.cos(th)*rr*d, sy: y*d, sz: Math.sin(th)*rr*d,
    x: Math.cos(th)*rr*d, y: y*d, z: Math.sin(th)*rr*d,
    baseSize: Math.random() < 0.025 ? 2.2 + Math.random()*1.8 : 0.5 + Math.random()*0.9,
    isHot: Math.random() < 0.025,
    phase: Math.random()*Math.PI*2,
    phV: 0.006 + Math.random()*0.018,
    alpha: 0.4 + Math.random()*0.6
  };
});

let rot = 0, time = 0, last = performance.now();

function ry3(x,y,z,a){ const c=Math.cos(a),s=Math.sin(a); return [x*c+z*s,y,-x*s+z*c]; }
function proj(x,y,z){ const fov=380; const dz=fov+z*R; if(dz<1) return [0,0,0.001]; const sc=fov/dz; return [x*R*sc,y*R*sc,sc]; }

function drawSphere(now) {
  const dt = Math.min((now - last)/1000, 0.05);
  last = now; time += dt; rot += dt * 0.14;

  for (const p of pts) {
    p.phase += p.phV;
    const br = 1 + Math.sin(time*0.8 + p.phase)*0.032;
    const tx = p.sx*br, ty = p.sy*br, tz = p.sz*br;
    p.x += (tx - p.x)*0.025;
    p.y += (ty - p.y)*0.025;
    p.z += (tz - p.z)*0.025;
  }

  ctx.clearRect(0,0,W,H);

  const spr = pts.map((p,i) => {
    const [rx,ry_,rz] = ry3(p.x,p.y,p.z,rot);
    const [sx,sy,sc] = proj(rx,ry_,rz);
    return { i, sx: CX+sx, sy: CY+sy, z: rz, sc };
  }).sort((a,b) => a.z - b.z);

  for (const sp of spr) {
    const p = pts[sp.i];
    const da = 0.15 + 0.85*sp.sc;
    const tw = 0.6 + 0.4*Math.sin(p.phase+time);
    let sz = p.baseSize * sp.sc;
    let al = p.alpha * da * tw;
    let cr, cg, cb;
    if (p.isHot) { cr=240; cg=120; cb=120; }
    else { cr=175; cg=212; cb=207; }

    if (p.baseSize > 2.0 && isFinite(sz) && sz > 0) {
      const g = ctx.createRadialGradient(sp.sx,sp.sy,0,sp.sx,sp.sy,sz*7);
      g.addColorStop(0, `rgba(${cr},${cg},${cb},${(al*0.5).toFixed(3)})`);
      g.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(sp.sx,sp.sy,sz*7,0,Math.PI*2); ctx.fill();
    }
    ctx.fillStyle = `rgba(${cr},${cg},${cb},${Math.min(1,al).toFixed(3)})`;
    ctx.beginPath(); ctx.arc(sp.sx,sp.sy,Math.max(0.3,sz),0,Math.PI*2); ctx.fill();
  }

  requestAnimationFrame(drawSphere);
}
requestAnimationFrame(t => { last = t; requestAnimationFrame(drawSphere); });
</script>
